# Hybrid P2P Architecture: Proxy -> Central Backend
#
#   Browser -> Proxy (0.0.0.0:8080) -> Central Backend (9000)
#
# The Central Backend handles Auth + Discovery only.
# Each client runs a Local Backend on port 3001 for messaging.
# Access via: http://<LAN_IP>:8080

default {
    proxy_pass http://127.0.0.1:9000;
}
