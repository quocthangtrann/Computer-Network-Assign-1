# Central server proxy layout:
#   http://SERVER_IP:8080/      -> static web layer on 127.0.0.1:3000
#   http://SERVER_IP:8080/api/* -> tracker backend on 127.0.0.1:3001
#
# The /api prefix is stripped before forwarding, so /api/login becomes /login
# at the tracker backend.

host "127.0.0.1:8080" {
    proxy_pass http://127.0.0.1:3000;
    proxy_pass http://127.0.0.1:3002;
}

path "/api" {
    proxy_pass http://127.0.0.1:3001;
    strip_prefix true;
}

default {
    proxy_pass http://127.0.0.1:3000;
}