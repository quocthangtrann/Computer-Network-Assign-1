# Centralized Hub: 1 Proxy -> 2 Backends (Round-Robin)
#
#   Browser -> Proxy (0.0.0.0:8080) -> Backend 9000 | Backend 9001
#
# Both backends serve static files (www/) AND API routes.
# The proxy round-robins every request between the two.
# Access via: http://192.168.1.4:8080

host "192.168.1.4:8080" {
    proxy_pass http://127.0.0.1:9000;
    proxy_pass http://127.0.0.1:9001;
    dist_policy round_robin;
}
